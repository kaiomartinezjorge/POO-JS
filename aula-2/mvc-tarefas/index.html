<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de tarefas MVC </title>
    <link rel="stylesheet" href="CSS/style.css">
</head>
<body>
    <div class="container">
        <h1>Lista de tarefas</h1>

        <div class="form-area">
            <input type="text" name="tarefaInput" id="tarefainput" placeholder="Digite uma tarefa...">
            <button id="addTarefaBtn">Adicionar</button>
        </div>

        <p id="mensagem"></p>

        <ul id="listaTarefas"></ul>
    </div>
</body>
<script type="module" src="JS/app.js"></script>
<!-- module é a identificação para o navegador, que o arquivo é um módulo, ou seja, parte pequena de um código maior. -->
</html>
